<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMatch</title>
    <link rel="stylesheet" href="CineMatch.css">
    <link rel="icon" type="image/ico" href="CineMatchLogo.png">
    <script src="i18n.js" defer></script>
</head>

<body id="body">
    <div id="header">
        <img src="CineMatchLogo_Schatten.png" alt="CineMatchLogo" class="CineMatchLogo">
        <h1 class="title">CineMatch</h1>
        <div class="search-container">
            <form class="search-bar" id="searchBar" role="search" autocomplete="off">
                <span class="search-bar-logo" aria-hidden="true">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="7"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </span>
                <input type="text" id="searchInput" class="search-bar-input"
                    data-i18n-placeholder="header.searchPlaceholder" placeholder="Filme suchen...">
                <span class="search-bar-spinner" id="searchSpinner" aria-hidden="true"></span>
                <button type="submit" id="searchBarBtn" class="search-bar-btn" aria-label="Suchen">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="7"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
                <div class="search-dropdown" id="searchDropdown" hidden>
                    <!-- Vorschläge / Verlauf werden hier dynamisch eingefügt -->
                </div>
            </form>
        </div>
        <div class="header-right">
            <div class="lang-toggle" id="langToggle" role="group" aria-label="Language"></div>
            <button class="quiz-btn" data-i18n="header.startQuiz" onclick="redirectToQuiz()">Quiz starten</button>
            <div id="userArea" class="user-area"></div>
        </div>
    </div>
    <div id="content">
        <div class="section">
            <h2 data-i18n="section.trending">Im Trend</h2>
            <div class="movie-carousel" id="trendingCarousel">
                <!-- Filme werden hier dynamisch eingefügt -->
            </div>
        </div>
    </div>
    <div id="footer">
        <div class="footer-left">
            <span class="footer-brand">CineMatch</span>
            <span class="footer-copy">© 2026 – Schulprojekt</span>
        </div>
        <div class="footer-center">
            <a href="#">Datenschutz</a>
            <span class="footer-separator">|</span>
            <a href="#">AGB</a>
            <span class="footer-separator">|</span>
            <a href="#">Impressum</a>
        </div>
        <div class="footer-right">
            <span class="footer-tmdb">Powered by</span>
            <img src="tmdbLogo.svg" alt="tmdbLogo" class="tmdbLogo">
        </div>
    </div>
