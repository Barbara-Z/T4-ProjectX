<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMatch</title>
    <link rel="stylesheet" href="CineMatch.css">
    <link rel="icon" type="image/ico" href="CineMatchLogo.png">
    <script src="i18n.js" defer></script>
</head>

<body id="body">
    <div id="header">
        <img src="CineMatchLogo_Schatten.png" alt="CineMatchLogo" class="CineMatchLogo">
        <h1 class="title">CineMatch</h1>
        <div class="search-container">
            <input type="text" data-i18n-placeholder="header.searchPlaceholder" placeholder="Filme suchen..." class="search-input">
        </div>
        <div class="header-right">
            <div class="lang-toggle" id="langToggle" role="group" aria-label="Language"></div>
            <button class="quiz-btn" data-i18n="header.startQuiz" onclick="redirectToQuiz()">Quiz starten</button>
            <div id="userArea" class="user-area"></div>
        </div>
    </div>
    <div id="content">
        <div class="section">
            <h2 data-i18n="section.trending">Im Trend</h2>
            <div class="movie-carousel" id="trendingCarousel">
                <!-- Filme werden hier dynamisch eingefügt -->
            </div>
        </div>
    </div>
    <div id="footer">
        <img src="tmdbLogo.svg" alt="tmdbLogo" class="tmdbLogo">
    </div>

    <!-- Film-Details Modal -->
    <div id="movieModal" class="movie-modal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <div class="modal-body">
                <div class="modal-poster">
                    <img id="modalPoster" src="" alt="Poster">
                </div>
                <div class="modal-info">
                    <h2 id="modalTitle"></h2>
                    <div class="modal-rating">
                        <span class="rating-stars">⭐ <span id="modalRating"></span></span>
                    </div>
                    <div class="modal-details">
                        <div class="detail-item">
                            <strong data-i18n="modal.releaseDate">Veröffentlichungsdatum:</strong>
                            <span id="modalReleaseDate"></span>
                        </div>
                        <div class="detail-item">
                            <strong data-i18n="modal.runtime">Filmlänge:</strong>
                            <span id="modalRuntime"></span>
                        </div>
                        <div class="detail-item">
                            <strong data-i18n="modal.genre">Genre:</strong>
                            <span id="modalGenres"></span>
                        </div>
                        <div class="detail-item">
                            <strong data-i18n="modal.director">Regisseur:</strong>
                            <span id="modalDirector"></span>
                        </div>
                        <div class="detail-item">
                            <strong data-i18n="modal.writer">Drehbuchautor:</strong>
                            <span id="modalWriter"></span>
                        </div>
                        <div class="detail-item">
                            <strong data-i18n="modal.votes">Bewertungen:</strong>
                            <span id="modalVoteCount"></span>
                        </div>
                    </div>
                    <div class="modal-overview">
                        <h3 data-i18n="modal.description">Beschreibung</h3>
                        <p id="modalOverview"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
