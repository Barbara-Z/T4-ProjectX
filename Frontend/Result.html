<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="result.pageTitle">Deine Empfehlungen | CineMatch</title>
  <link rel="icon" type="image/png" href="CineMatchLogo.png">
  <link rel="stylesheet" href="Result.css">
  <script src="i18n.js" defer></script>
  <script src="result.js" defer></script>
</head>

<body>
  <header class="result-header">
    <a href="/CineMatch.html" class="brand">
      <img src="CineMatchLogo_Schatten.png" alt="CineMatchLogo" class="CineMatchLogo">
      <span class="brand-name">CineMatch</span>
    </a>
    <div style="display:flex; align-items:center; gap:14px;">
      <div class="lang-toggle" id="langToggle" role="group" aria-label="Language"></div>
      <a href="/Quiz.html" class="retake-btn" data-i18n="result.retake">Quiz wiederholen</a>
    </div>
  </header>
  <main class="result-main">
    <section class="result-hero">
      <p class="result-eyebrow" data-i18n="result.eyebrow">Dein Match-Ergebnis</p>
      <h1 class="result-title" data-i18n="result.title">Diese Filme passen zu dir</h1>
      <p class="result-subtitle">
        <span data-i18n="result.topGenre">Top-Genre:</span> <span id="top-genre" class="result-tag">–</span>
        <span id="prefs-summary" class="prefs-summary"></span>
      </p>
    </section>
    <section id="cards" class="cards" aria-live="polite">
      <div class="loading" data-i18n="result.loading">Empfehlungen werden geladen…</div>
    </section>
  </main>
  <footer id="footer">
    <div class="footer-left">
      <span class="footer-brand">CineMatch</span>
      <span class="footer-copy">© 2026 – Schulprojekt</span>
    </div>
    <div class="footer-center">
      <a href="#">Datenschutz</a>
      <span class="footer-separator">|</span>
      <a href="#">AGB</a>
      <span class="footer-separator">|</span>
      <a href="#">Impressum</a>
    </div>
    <div class="footer-right">
      <span class="footer-tmdb">Powered by</span>
      <a href="https://www.themoviedb.org/" target="_blank" rel="noopener noreferrer">
        <img src="tmdbLogo.svg" alt="tmdbLogo" class="tmdbLogo">
      </a>
    </div>
  </footer>
</body>

</html>
