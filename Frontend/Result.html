<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Deine Empfehlungen | CineMatch</title>
  <link rel="icon" type="image/png" href="CineMatchLogo.png">
  <link rel="stylesheet" href="Result.css">
  <script src="result.js" defer></script>
</head>

<body>
  <header class="result-header">
    <a href="/CineMatch.html" class="brand">
      <img src="CineMatchLogo.png" alt="CineMatch" class="brand-logo">
      <span class="brand-name">CineMatch</span>
    </a>
    <a href="/Quiz.html" class="retake-btn">Quiz wiederholen</a>
  </header>

  <main class="result-main">
    <section class="result-hero">
      <p class="result-eyebrow">Dein Match-Ergebnis</p>
      <h1 class="result-title">Diese Filme passen zu dir</h1>
      <p class="result-subtitle">
        Top-Genre: <span id="top-genre" class="result-tag">–</span>
        <span id="prefs-summary" class="prefs-summary"></span>
      </p>
    </section>

    <section id="cards" class="cards" aria-live="polite">
      <div class="loading">Empfehlungen werden geladen…</div>
    </section>
  </main>

  <footer class="result-footer">
    <span>Empfehlungen powered by</span>
    <img src="tmdbLogo.svg" alt="TMDB" class="tmdb-logo">
  </footer>
</body>

</html>
