<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Film | CineMatch</title>
    <link rel="stylesheet" href="CineMatch.css">
    <link rel="icon" type="image/ico" href="CineMatchLogo.png">
    <script src="i18n.js" defer></script>
</head>

<body id="body">
    <div id="header">
        <a href="CineMatch.html"><img src="CineMatchLogo_Schatten.png" alt="CineMatchLogo" class="CineMatchLogo"></a>
        <h1 class="title"><a href="CineMatch.html" style="color:inherit;text-decoration:none;">CineMatch</a></h1>
        <div class="search-container">
            <form class="search-bar" id="searchBar" role="search" autocomplete="off">
                <span class="search-bar-logo" aria-hidden="true">🎬</span>
                <input type="text" id="searchInput" class="search-bar-input"
                       data-i18n-placeholder="header.searchPlaceholder"
                       placeholder="Filme suchen...">
                <span class="search-bar-spinner" id="searchSpinner" aria-hidden="true"></span>
                <button type="submit" id="searchBarBtn" class="search-bar-btn" aria-label="Suchen">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="7"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
                <div class="search-dropdown" id="searchDropdown" hidden></div>
            </form>
        </div>
        <div class="header-right">
            <div class="lang-toggle" id="langToggle" role="group" aria-label="Language"></div>
            <button class="quiz-btn" data-i18n="header.startQuiz" onclick="redirectToQuiz()">Quiz starten</button>
            <div id="userArea" class="user-area"></div>
        </div>
    </div>

    <div id="content">
        <div class="movie-page" id="moviePage">
            <div class="movie-page-loading" id="movieLoading" data-i18n="movie.loading">Film wird geladen...</div>

            <div class="movie-page-body" id="movieBody" hidden>
                <div class="movie-page-poster">
                    <img id="movieDetailPoster" src="" alt="">
                </div>
                <div class="movie-page-info">
                    <h1 id="movieDetailTitle" class="movie-page-title"></h1>
                    <div class="movie-page-meta">
                        <span class="movie-page-rating">⭐ <span id="movieDetailRating"></span></span>
                        <span class="movie-page-dot">·</span>
                        <span id="movieDetailReleaseDate"></span>
                    </div>
                    <h3 data-i18n="modal.description">Beschreibung</h3>
                    <p id="movieDetailOverview" class="movie-page-overview"></p>
                </div>
            </div>

            <!-- Kommentar-Sektion (gleiche Klassen wie zuvor, deshalb wiederverwendbares CSS) -->
            <div class="modal-comments movie-page-comments" id="movieCommentsBlock" hidden>
                <h3 data-i18n="comments.title">Kommentare</h3>
                <form class="comment-form" id="commentForm">
                    <textarea id="commentInput" rows="3" maxlength="1000"
                              data-i18n-placeholder="comments.placeholder"
                              placeholder="Was hältst du von diesem Film?"></textarea>
                    <div class="comment-form-actions">
                        <span class="comment-counter" id="commentCounter">0 / 1000</span>
                        <button type="submit" class="comment-submit" data-i18n="comments.submit">Kommentar posten</button>
                    </div>
                </form>
                <div class="comment-list" id="commentList"></div>
            </div>
        </div>
    </div>

    <div id="footer">
        <img src="tmdbLogo.svg" alt="tmdbLogo" class="tmdbLogo">
    </div>

    <!-- Login Required Modal: Anmelden + Registrieren -->
    <div id="loginRequiredModal" class="login-required-modal">
        <div class="lr-content">
            <button class="lr-close" id="lrClose" aria-label="Schließen">&times;</button>
            <div class="lr-icon">💬</div>
            <h2 data-i18n="loginRequired.title">Login erforderlich</h2>
            <p data-i18n="loginRequired.text">
                Du musst eingeloggt sein, um Kommentare zu schreiben.
            </p>
            <div class="lr-actions">
                <a href="Login.html" class="lr-btn lr-btn-primary" data-i18n="loginRequired.loginBtn">Anmelden</a>
                <a href="Register.html" class="lr-btn lr-btn-secondary" data-i18n="loginRequired.registerBtn">Registrieren</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="movie.js"></script>
</body>

</html>
