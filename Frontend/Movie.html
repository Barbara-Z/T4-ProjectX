<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Film | CineMatch</title>
    <link rel="stylesheet" href="CineMatch.css">
    <link rel="icon" type="image/ico" href="CineMatchLogo.png">
    <script src="i18n.js" defer></script>
</head>

<body id="body">
    <div id="header">
        <a href="CineMatch.html"><img src="CineMatchLogo_Schatten.png" alt="CineMatchLogo" class="CineMatchLogo"></a>
        <h1 class="title"><a href="CineMatch.html" style="color:inherit;text-decoration:none;">CineMatch</a></h1>
        <div class="search-container">
            <form class="search-bar" id="searchBar" role="search" autocomplete="off">
                <span class="search-bar-logo" aria-hidden="true">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="7"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </span>
                <input type="text" id="searchInput" class="search-bar-input"
                       data-i18n-placeholder="header.searchPlaceholder"
                       placeholder="Filme suchen...">
                <span class="search-bar-spinner" id="searchSpinner" aria-hidden="true"></span>
                <button type="submit" id="searchBarBtn" class="search-bar-btn" aria-label="Suchen">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="7"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
                <div class="search-dropdown" id="searchDropdown" hidden></div>
            </form>
        </div>
        <div class="header-right">
            <div class="lang-toggle" id="langToggle" role="group" aria-label="Language"></div>
            <button class="quiz-btn" data-i18n="header.startQuiz" onclick="redirectToQuiz()">Quiz starten</button>
            <div id="userArea" class="user-area"></div>
        </div>
    </div>

    <div id="content">
        <div class="movie-page" id="moviePage">
            <div class="movie-page-loading" id="movieLoading" data-i18n="movie.loading">Film wird geladen...</div>

            <article class="movie-detail" id="movieBody" hidden>
                <!-- Hero: Backdrop + Poster + Titel + Genre-Pills + Rating-Ring -->
                <header class="movie-hero">
                    <div class="movie-hero-backdrop" id="movieBackdrop"></div>
                    <div class="movie-hero-fade"></div>
                    <div class="movie-hero-glow"></div>
                    <div class="movie-hero-content">
                        <div class="movie-hero-poster">
                            <img id="movieDetailPoster" src="" alt="">
                        </div>
                        <div class="movie-hero-info">
                            <h1 id="movieDetailTitle" class="movie-hero-title"></h1>
                            <div class="movie-genre-pills" id="movieGenrePills"></div>
                            <div class="movie-keymeta">
                                <div class="movie-rating-ring" aria-hidden="true">
                                    <svg viewBox="0 0 40 40" class="rating-svg">
                                        <circle class="rating-bg" cx="20" cy="20" r="17"></circle>
                                        <circle class="rating-fg" cx="20" cy="20" r="17" id="movieRatingArc"></circle>
                                    </svg>
                                    <span class="rating-text" id="movieDetailRating">–</span>
                                </div>
                                <div class="movie-keymeta-text">
                                    <span class="meta-eyebrow" data-i18n="movie.userScore">Zuschauer-Score</span>
                                    <span class="meta-line">
                                        <span id="movieDetailReleaseYear">–</span>
                                        <span class="movie-meta-dot">•</span>
                                        <span id="movieDetailRuntimeShort">–</span>
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                </header>

                <!-- Info-Karten -->
                <section class="movie-info-grid">
                    <div class="movie-info-card">
                        <div class="movie-info-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="4" width="18" height="18" rx="2"></rect>
                                <line x1="16" y1="2" x2="16" y2="6"></line>
                                <line x1="8" y1="2" x2="8" y2="6"></line>
                                <line x1="3" y1="10" x2="21" y2="10"></line>
                            </svg>
                        </div>
                        <div class="movie-info-text">
                            <div class="movie-info-label" data-i18n="modal.releaseDate">Veröffentlichungsdatum:</div>
                            <div class="movie-info-value" id="movieDetailReleaseDate">–</div>
                        </div>
                    </div>
                    <div class="movie-info-card">
                        <div class="movie-info-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"></circle>
                                <polyline points="12 6 12 12 16 14"></polyline>
                            </svg>
                        </div>
                        <div class="movie-info-text">
                            <div class="movie-info-label" data-i18n="modal.runtime">Filmlänge:</div>
                            <div class="movie-info-value" id="movieDetailRuntime">–</div>
                        </div>
                    </div>
                    <div class="movie-info-card">
                        <div class="movie-info-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="2" y="2" width="20" height="20" rx="2.5"></rect>
                                <line x1="7" y1="2" x2="7" y2="22"></line>
                                <line x1="17" y1="2" x2="17" y2="22"></line>
                                <line x1="2" y1="12" x2="22" y2="12"></line>
                                <line x1="2" y1="7" x2="7" y2="7"></line>
                                <line x1="2" y1="17" x2="7" y2="17"></line>
                                <line x1="17" y1="17" x2="22" y2="17"></line>
                                <line x1="17" y1="7" x2="22" y2="7"></line>
                            </svg>
                        </div>
                        <div class="movie-info-text">
                            <div class="movie-info-label" data-i18n="modal.genre">Genre:</div>
                            <div class="movie-info-value" id="movieDetailGenre">–</div>
                        </div>
                    </div>
                    <div class="movie-info-card">
                        <div class="movie-info-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                        </div>
                        <div class="movie-info-text">
                            <div class="movie-info-label" data-i18n="modal.director">Regisseur:</div>
                            <div class="movie-info-value" id="movieDetailDirector">–</div>
                        </div>
                    </div>
                </section>

                <!-- Streaming-Anbieter -->
                <section class="movie-section movie-providers-block" id="movieProvidersBlock" hidden>
                    <h3 class="movie-section-title" data-i18n="modal.providers">Verfügbar bei</h3>
                    <div class="provider-list" id="movieProvidersList"></div>
                </section>

                <!-- Beschreibung -->
                <section class="movie-section movie-overview-block">
                    <h3 class="movie-section-title" data-i18n="modal.description">Beschreibung</h3>
                    <p id="movieDetailOverview" class="movie-overview-text"></p>
                </section>
            </article>

            <!-- Kommentare -->
            <section class="movie-comments-section" id="movieCommentsBlock" hidden>
                <h3 class="movie-section-title" data-i18n="comments.title">Kommentare</h3>
                <form class="comment-form" id="commentForm">
                    <textarea id="commentInput" rows="3" maxlength="1000"
                              data-i18n-placeholder="comments.placeholder"
                              placeholder="Was hältst du von diesem Film?"></textarea>
                    <div class="comment-form-actions">
                        <span class="comment-counter" id="commentCounter">0 / 1000</span>
                        <button type="submit" class="comment-submit" data-i18n="comments.submit">Kommentar posten</button>
                    </div>
                </form>
                <div class="comment-list" id="commentList"></div>
            </section>
        </div>
    </div>

    <div id="footer">
        <img src="tmdbLogo.svg" alt="tmdbLogo" class="tmdbLogo">
    </div>

    <!-- Login Required Modal: Anmelden + Registrieren -->
    <div id="loginRequiredModal" class="login-required-modal">
        <div class="lr-content">
            <button class="lr-close" id="lrClose" aria-label="Schließen">&times;</button>
            <div class="lr-icon">💬</div>
            <h2 data-i18n="loginRequired.title">Login erforderlich</h2>
            <p data-i18n="loginRequired.text">
                Du musst eingeloggt sein, um Kommentare zu schreiben.
            </p>
            <div class="lr-actions">
                <a href="Login.html" class="lr-btn lr-btn-primary" data-i18n="loginRequired.loginBtn">Anmelden</a>
                <a href="Register.html" class="lr-btn lr-btn-secondary" data-i18n="loginRequired.registerBtn">Registrieren</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="movie.js"></script>
</body>

</html>
