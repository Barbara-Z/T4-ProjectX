<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - CineMatch</title>

    <script src="quiz.js" defer></script>

    <link rel="icon" type="image/ico" href="CineMatchLogo.png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            color: #fff;
            padding: 20px;
        }

        .quiz-container {
            width: 100%;
            max-width: 900px;
            min-height: 500px;
            background: rgba(30, 30, 30, 0.8);
            backdrop-filter: blur(10px);

            padding: 30px 50px;

            border-radius: 20px;

            border: 1px solid rgba(187, 13, 19, 0.3);

            box-shadow: 0 8px 32px rgba(187, 13, 19, 0.2);
        }

        

        .quiz-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .quiz-header h1 {
            color: #bb0d13;
            font-size: 36px;
            margin-bottom: 10px;
        }

        .quiz-header p {
            color: #aaa;
            font-size: 15px;
        }

        .frage-box {
            margin-bottom: 20px;
        }

        #frage {
            font-size: 18px;
            line-height: 1.5;
            text-align: center;
            color: #fff;
        }

        .antworten {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        .antwort-btn {
            width: 100%;
            padding: 15px;

            border: 1px solid rgba(187, 13, 19, 0.3);

            background: rgba(255, 255, 255, 0.05);

            color: white;

            border-radius: 10px;

            cursor: pointer;

            transition: all 0.3s ease;

            font-size: 16px;
        }

        .antwort-btn:hover {
            background: rgba(187, 13, 19, 0.2);
            border-color: #bb0d13;

            transform: translateY(-2px);

            box-shadow: 0 5px 15px rgba(187, 13, 19, 0.3);
        }

        #nächsteFrage {
            width: 100%;

            padding: 14px;

            background: linear-gradient(135deg, #bb0d13, #ff4444);

            border: none;

            border-radius: 10px;

            color: white;

            font-size: 17px;

            font-weight: bold;

            cursor: pointer;

            transition: all 0.3s ease;
        }

        #nächsteFrage:hover {
            transform: translateY(-2px);

            box-shadow: 0 8px 20px rgba(187, 13, 19, 0.4);
        }

        .fortschritt {
            text-align: center;
            margin-bottom: 25px;
            color: #aaa;
            font-size: 14px;
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;

            color: #bb0d13;

            text-decoration: none;

            font-size: 14px;

            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #ff4444;
        }

        @media (max-width: 768px) {
            .quiz-container {
                padding: 25px;
            }

            #frage {
                font-size: 22px;
            }

            .quiz-header h1 {
                font-size: 28px;
            }
        }

        .progress-bar {
            width: 100%;
            height: 10px;

            background: rgba(255, 255, 255, 0.08);

            border-radius: 20px;

            overflow: hidden;

            margin-bottom: 30px;
        }

        .progress-fill {
            height: 100%;

            width: 10%;

            background: linear-gradient(90deg, #bb0d13, #ff4444);

           border-radius: 20px;

            transition: width 0.4s ease;

            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
    }
    </style>
</head>

<body>

    <a href="CineMatch.html" class="back-link">← Zurück</a>

    <div class="quiz-container">

        <div class="quiz-header">
            <h1>CineMatch Quiz</h1>
            <p>Finde Filme & Serien passend zu deinem Geschmack</p>
        </div>

        <div class="fortschritt">
            Frage 1 von 10
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="frage-box">
            <div id="frage">
                Welche Filmgenres magst du am meisten?
            </div>
        </div>

        <div class="antworten">

            <button class="antwort-btn">
                Action
            </button>

            <button class="antwort-btn">
                Horror
            </button>

            <button class="antwort-btn">
                Sci-Fi
            </button>

            <button class="antwort-btn">
                Comedy
            </button>

        </div>

        <button id="nächsteFrage">
            Nächste Frage
        </button>

    </div>

</body>

</html>
